# Loop manifest — kanban-handoff-reconciler (second shipped loop, spec §Loop manifest)
# Schema: loop cell = detect (script) -> propose (LLM) -> verify (cell) -> apply (gated).
# Consumed by reference/scripts/run-loop.ps1. Policy lives HERE, not in prompts or code.
#
# This is the loop that proved the runner seam: a materially different cell —
# different detector, different verifier id, different repair types — running
# through the same generic runner as wrap-tail-repair, from a manifest plus a
# cell script alone (spec §Pluggability conformance test's mechanism at the
# loop layer).
#
# What it maintains: handoff status and Kanban check-state agree for every
# citation link between them. Two finding types:
#   D1 ready-but-done  — a ready handoff whose citing Kanban cards are all
#                        checked; repair flips it complete WITH the evidence
#                        (completed_date, drafted completion note, task:
#                        citations built from the actual matched cards). The
#                        drafted one-line note is the loop's only LLM box.
#   D2 cited-but-open  — a complete handoff citing a still-open task; repair
#                        checks the box. Deterministic, no LLM.
# Deliberately NOT a repair: flipping anything to obsolete. Supersession is a
# judgment call — no deterministic detector distinguishes "finished elsewhere"
# from "abandoned" — so it stays with attended judgment passes, never here.

loop: kanban-handoff-reconciler
invariant: handoff status and Kanban check-state agree for every citation link between them

cell: kanban-handoff-reconciler.cell.ps1

# A proposal may only ever target these paths. Enforced by the runner and applier.
# Scope grammar: exact path | 'dir/' prefix | '**/suffix'.
scope:
  - _meta/handoffs/
  - "**/_meta/Kanban.md"

detect:
  script: detect-kanban-handoff-drift.ps1
  args: -DryRun

# verify: status-sync — deterministic structural checks on the drafted completion
# note (single line, 40..500 chars, YAML-safe). The frontmatter block itself is
# built deterministically by the cell; the LLM never writes structure.
verify: status-sync

# propose-only until earned: every finding lands in the review queue for the human
# walk. Auto-apply is earned per endpoint via ledger evidence (promote_after),
# never inherited — and note this loop's scope touches handoff status and Kanban
# state, which feed resume-session signal; weigh that before ever enabling auto.
apply: propose-only
auto_apply_endpoints: []
promote_after: 5

# Priority order (spec §Endpoint degradation): quality ceiling first, availability
# floor last. Swap in your own driver/model/url — illustrative, not load-bearing.
endpoints:
  - driver: claude-cli
    model: <your-frontier-model>
    timeout_sec: 180
  - driver: ollama
    url: http://localhost:11434
    model: <your-local-model>
    num_ctx: 8192
    timeout_sec: 120

budget:
  max_prompt_chars: 24000
  max_calls_per_run: 6

# Prompt template (script-consumed, so it lives alongside the reference scripts)
prompt: loop-kanban-handoff-reconciler.prompt.md
