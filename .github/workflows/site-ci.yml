name: site-ci

on:
  workflow_dispatch:
  push:
    paths:
      - 'spec/**'
      - 'README.md'
      - 'reference/**'
      - '.github/workflows/site-ci.yml'
  pull_request:
    branches: [main]

concurrency:
  group: site-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: voice lint - no em/en dashes in shipped copy
        run: |
          set -e
          FILES=$(git ls-files 'spec/*.md' 'README.md' 'reference/**' | grep -E '\.(html|md)$' || true)
          BAD=0
          for f in $FILES; do
            HITS=$(perl -CSD -ne 'print "$.: $_" if /[\x{2014}\x{2013}]/' "$f")
            if [ -n "$HITS" ]; then
              echo "::error file=$f::em/en dash found (PPG voice rule: plain hyphens only)"
              echo "$f:"
              echo "$HITS" | head -5
              BAD=1
            fi
          done
          exit $BAD
