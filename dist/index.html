// ─── O-BOY (interactive ASCII friend) ─────────────────────────────
// Poses are eyes+mouth pairs framed into the same 7-line box. The original
// six are the click-toy cycle (cosmetic, random). thinking/sleep/error are
// named, state-driven expressions the HUD pill (below) reflects live status
// with — not part of the random click cycle.
function oBoyFrame(eyes, mouth) {
  return [
    '   ___   ',
    '  |' + eyes + '|  ',
    '  |' + mouth + '|  ',
    '  |___|  ',
    '   | |   ',
    '  /| |\\  ',
    '   |_|   ',
  ];
}

const O_BOY_POSES = [
  oBoyFrame('o o', ' _ '),
  oBoyFrame('- -', ' _ '),
  oBoyFrame('^ ^', '\\_/'),
  oBoyFrame('O O', ' o '),
  oBoyFrame('- o', ' _ '),
  oBoyFrame('z z', ' _ '),
];

// Named expressions the HUD pill drives from qa-status.json (or its own
// fetch/idle state) rather than the click cycle above.
const O_BOY_EXPR = {
  neutral:  oBoyFrame('o o', ' _ '),
  thinking: oBoyFrame('. .', ' ? '),
  sleep:    oBoyFrame('- -', ' z '),
  error:    oBoyFrame('x x', ' ! '),
};

const O_BOY_SAYINGS = [
  'oh hi',
  'spec is law',
  'gates are local',
  'no LLM in gates',
  'mind the cascade',
  "frontmatter or it didn't happen",
  '*beep*',
  'tombstones forever',
  '...',
  'ready',
  'friction-free in',
  'structured out',
];

function OBoy() {
  const [pose, setPose] = useState(0);
  const [say, setSay] = useState(null);
  const sayTimerRef = useRef(null);

  const click = (e) => {
    e.stopPropagation();
    setPose(p => (p + 1) % O_BOY_POSES.length);
    const msg = O_BOY_SAYINGS[Math.floor(Math.random() * O_BOY_SAYINGS.length)];
    setSay(msg);
    if (sayTimerRef.current) clearTimeout(sayTimerRef.current);
    sayTimerRef.current = setTimeout(() => setSay(null), 2200);
  };

  useEffect(() => () => {
    if (sayTimerRef.current) clearTimeout(sayTimerRef.current);
  }, []);

  return (
    <div onClick={click} style={{
      cursor: 'pointer',
      userSelect: 'none',
      display: 'inline-block',
      padding: '4px 8px',
    }}>
      <div style={{ height: '1.65em', color: 'var(--accent)', whiteSpace: 'pre' }}>
        {say ? `‹ ${say} ›` : ' '}
      </div>
      {O_BOY_POSES[pose].map((line, i) => (
        <div key={i} style={{
          color: 'var(--text)',
          lineHeight: 1.1,
          whiteSpace: 'pre',
        }}>{line}</div>
      ))}
      <div style={{
        color: 'var(--text-3)',
        marginTop: '6px',
        whiteSpace: 'pre',
      }}>
        {'‹ click me ›'}
      </div>
    </div>
  );
}

// ─── HUD (collapsed pill · live qa-status, when a vault serves this file) ──
// Minimal always-on state: o-boy eyes + clock. Click expands into the full
// face + a one-line audit summary. On system-o.org there's no vault behind
// this static page, so the fetch below 404s and the HUD settles into
// 'sleep' — that's the honest state for "no live data," distinct from
// 'error' (the audit ran and found something) (_meta/Kanban.md, post-v1.0).
function useClock() {
  const [now, setNow] = useState(() => new Date());
  useEffect(() => {
    const id = setInterval(() => setNow(new Date()), 1000);
    return () => clearInterval(id);
  }, []);
  const hh = String(now.getHours()).padStart(2, '0');
  const mm = String(now.getMinutes()).padStart(2, '0');
  return `${hh}:${mm}`;
}

function HudPill() {
  const [expanded, setExpanded] = useState(false);
  const [audit, setAudit] = useState({ state: 'loading', summary: 'checking for live vault data…' });
  const clock = useClock();

  useEffect(() => {
    let cancelled = false;
    fetch('_meta/logs/qa-status.json', { cache: 'no-store' })
      .then(r => { if (!r.ok) throw new Error(`${r.status}`); return r.json(); })
      .then(data => {
        if (cancelled) return;
        const flagged = Array.isArray(data.checks) ? data.checks.filter(c => c.status === 'flagged') : [];
        setAudit({
          state: data.ok === false || flagged.length > 0 ? 'error' : 'ok',
          summary: data.ok === false || flagged.length > 0
            ? `audit: ${flagged.length} flagged — ${flagged.map(c => c.name).join(', ')}`
            : `audit: ${Array.isArray(data.checks) ? data.checks.length : 0} checks clear`,
        });
      })
      .catch(() => {
        if (cancelled) return;
        setAudit({ state: 'sleep', summary: 'audit: no live vault data (static page)' });
      });
    return () => { cancelled = true; };
  }, []);

  const expr = audit.state === 'loading' ? 'thinking'
             : audit.state === 'error'   ? 'error'
             : audit.state === 'sleep'   ? 'sleep'
             : 'neutral';
  const eyesOnly = O_BOY_EXPR[expr][1].slice(3, 6); // the 3-char eyes slot inside '  |xxx|  '

  return (
    <div
      onClick={(e) => { e.stopPropagation(); setExpanded(x => !x); }}
      style={{
        position: 'fixed', top: 14, right: 16, zIndex: 20,
        cursor: 'pointer', userSelect: 'none',
        fontFamily: 'var(--mono)',
      }}
    >
      {!expanded ? (
        <div style={{
          display: 'flex', alignItems: 'center', gap: 8,
          border: '1px solid var(--border)', borderRadius: 999,
          background: 'var(--surface)', padding: '5px 12px',
          fontSize: 12,
        }}>
          <span style={{
            color: expr === 'error' ? 'var(--red)' : 'var(--accent)',
            whiteSpace: 'pre',
          }}>{eyesOnly}</span>
          <span style={{ color: 'var(--text-2)' }}>{clock}</span>
        </div>
      ) : (
        <div style={{
          border: '1px solid var(--border)', borderRadius: 'var(--radius)',
          background: 'var(--surface)', padding: '10px 14px',
          fontSize: 12, minWidth: 220,
        }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 6 }}>
            <span style={{ color: 'var(--text-2)' }}>{clock}</span>
            <span style={{ color: 'var(--text-3)' }}>{'‹ click to collapse ›'}</span>
          </div>
          {O_BOY_EXPR[expr].map((line, i) => (
            <div key={i} style={{
              color: expr === 'error' ? 'var(--red)' : 'var(--text)',
              lineHeight: 1.1, whiteSpace: 'pre',
            }}>{line}</div>
          ))}
          <div style={{ marginTop: 6, color: 'var(--text-3)' }}>{audit.summary}</div>
        </div>
      )}
    </div>
  );
}

      <Line><Dim2>github.com/presspausegarage/system-o</Dim2></Line>,
      <Gap />,
      <Line><Dim2>If the tab did not open:</Dim2></Line>,
      <Line>  <a href="https://github.com/presspausegarage/system-o" target="_blank"
          style={{ color: 'var(--blue)', textDecoration: 'none' }}>
          github.com/presspausegarage/system-o
        </a></Line>,
    ];
  },

  'o-boy': () => [<OBoy />],

  clear: () => '__CLEAR__',
};

const AUTOCOMPLETE = Object.keys(COMMANDS).sort();

// ─── MAIN TERMINAL ────────────────────────────────────────────────
function Terminal() {
  const [history, setHistory] = useState([]);   // rendered output blocks
  const [input, setInput] = useState('');
  const [cmdHistory, setCmdHistory] = useState([]);
  const [histIdx, setHistIdx] = useState(-1);
  const [booted, setBooted] = useState(false);
  const [bootLines, setBootLines] = useState([]);
  const endRef = useRef(null);
  const inputRef = useRef(null);

  // ── boot sequence
  useEffect(() => {
    let timers = [];
    BOOT_LINES.forEach((bl, i) => {
      const t = setTimeout(() => {
        setBootLines(prev => [...prev, bl]);
        if (i === BOOT_LINES.length - 1) setBooted(true);
      }, bl.delay);
      timers.push(t);
    });
    return () => timers.forEach(clearTimeout);
  }, []);

  // ── auto-scroll
  useEffect(() => {
    endRef.current?.scrollIntoView({ block: 'end' });
  }, [history, bootLines]);

  // ── focus on click anywhere
  const focusInput = () => inputRef.current?.focus();

  const runCommand = useCallback((raw) => {
    const cmd = raw.trim().toLowerCase();
    if (!cmd) return;

    setCmdHistory(prev => [raw, ...prev]);
    setHistIdx(-1);

    if (cmd === 'clear') {
      setHistory([]);
      setBootLines([]);
      return;
    }

    const handler = COMMANDS[cmd];
    const output = handler
      ? handler()
      : [
          <Line><Red>command not found:</Red> <T c="var(--text)">{cmd}</T></Line>,
          <Line><Dim2>Type  help  to list commands.</Dim2></Line>,
        ];

    if (output === '__CLEAR__') { setHistory([]); return; }

    setHistory(prev => [
      ...prev,
      {
        prompt: raw,
        lines: output,
        id: Date.now() + Math.random(),
      },
    ]);
  }, []);

  const handleKey = (e) => {
    if (e.key === 'Enter') {
      runCommand(input);
      setInput('');
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      const newIdx = Math.min(histIdx + 1, cmdHistory.length - 1);
      setHistIdx(newIdx);
      setInput(cmdHistory[newIdx] ?? '');
    } else if (e.key === 'ArrowDown') {
      e.preventDefault();
      const newIdx = Math.max(histIdx - 1, -1);
      setHistIdx(newIdx);
      setInput(newIdx === -1 ? '' : cmdHistory[newIdx] ?? '');
    } else if (e.key === 'Tab') {
      e.preventDefault();
      const match = AUTOCOMPLETE.find(c => c.startsWith(input.toLowerCase()));
      if (match) setInput(match);
    }
  };

  return (
    <div
      onClick={focusInput}
      style={{
        width: '100vw', height: '100vh',
        display: 'flex', flexDirection: 'column',
        background: 'var(--bg)',
        cursor: 'text',
        position: 'relative',
        overflow: 'hidden',
      }}
    >
      {/* scanline overlay */}
      <div style={{
        position: 'absolute', inset: 0, pointerEvents: 'none', zIndex: 10,
        background: 'repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.04) 2px, rgba(0,0,0,0.04) 4px)',
      }} />

      {/* HUD collapsed pill — o-boy eyes + clock, expands on click (_meta/Kanban.md) */}
      <HudPill />

      {/* terminal body */}
      <div
        style={{
          flex: 1, overflowY: 'auto', padding: '18px 28px 0',
          fontFamily: 'var(--mono)', fontSize: 13,
        }}
      >
        {/* boot lines */}
        {bootLines.map((bl, i) => (
          <div key={i} style={{ color: bl.color || 'var(--text)', lineHeight: '1.65',
            animation: 'fadeIn 0.15s ease both',
            whiteSpace: 'pre',
          }}>
            {bl.text}
          </div>
        ))}

        {/* command history */}
        {history.map((block) => (
          <div key={block.id} style={{ animation: 'fadeIn 0.12s ease both' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, margin: '12px 0 4px' }}>
              <span style={{ color: 'var(--accent)', userSelect: 'none' }}>❯</span>
              <span style={{ color: 'var(--text)' }}>{block.prompt}</span>
            </div>
            <div style={{ paddingLeft: 4 }}>
              {block.lines.map((line, li) =>
                React.isValidElement(line)
                  ? React.cloneElement(line, { key: li })
                  : <div key={li}>{line}</div>
              )}
            </div>
          </div>
        ))}

        <div ref={endRef} style={{ height: 18 }} />
      </div>

      {/* input line */}
      <div style={{
        display: 'flex', alignItems: 'center', gap: 8,
        padding: '10px 28px 12px',
        borderTop: '1px solid var(--border)',
        background: 'var(--bg)', flexShrink: 0, zIndex: 2,
      }}>
        <span style={{ color: 'var(--accent)', fontSize: 14, userSelect: 'none' }}>❯</span>
        <input
          ref={inputRef}
          value={input}
          onChange={e => setInput(e.target.value)}
          onKeyDown={handleKey}
          autoFocus
          spellCheck={false}
          autoComplete="off"
          style={{
            flex: 1, background: 'transparent', border: 'none', outline: 'none',
            color: 'var(--text)', fontFamily: 'var(--mono)', fontSize: 13,
            caretColor: 'var(--accent)',
          }}
          placeholder=""
        />
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Terminal />);
</script>
</body>
</html>
