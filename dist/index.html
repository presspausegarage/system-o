<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>system-o — Markdown OS</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:         #0b0e18;
    --bg-2:       #0f1320;
    --surface:    #141829;
    --surface-2:  #1c2340;
    --border:     #242d4c;
    --border-2:   #2d3760;
    --text:       #e5e9f4;
    --text-2:     #9aa5c3;
    --text-3:     #5e6884;
    --accent:     #00c8a0;
    --accent-dim: rgba(0,200,160,0.12);
    --blue:       #4e8ef7;
    --blue-soft:  rgba(78,142,247,0.12);
    --amber:      #f5a623;
    --amber-soft: rgba(245,166,35,0.12);
    --red:        #ef4444;
    --red-soft:   rgba(239,68,68,0.12);
    --radius:     8px;
    --radius-sm:  5px;
    --mono:       'JetBrains Mono', monospace;
    --sans:       'DM Sans', sans-serif;
  }

  html, body, #root {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    color-scheme: dark;
    overflow: hidden;
  }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0; }
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes scanline {
    0%   { transform: translateY(-100%); }
    100% { transform: translateY(100vh); }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ─── colour helpers ───────────────────────────────────────────────
const T   = ({ c, children }) => <span style={{ color: c }}>{children}</span>;
const Teal  = ({ children }) => <T c="var(--accent)">{children}</T>;
const Blue  = ({ children }) => <T c="var(--blue)">{children}</T>;
const Amber = ({ children }) => <T c="var(--amber)">{children}</T>;
const Dim   = ({ children }) => <T c="var(--text-3)">{children}</T>;
const Dim2  = ({ children }) => <T c="var(--text-2)">{children}</T>;
const Red   = ({ children }) => <T c="var(--red)">{children}</T>;

// ─── output line types ────────────────────────────────────────────
const Line = ({ children, style }) => (
  <div style={{ lineHeight: '1.65', ...style }}>{children}</div>
);
const Gap = () => <div style={{ height: '6px' }} />;
const HR = () => (
  <div style={{
    height: 1,
    background: 'var(--border)',
    margin: '8px 0',
  }} />
);

// ─── BOOT SEQUENCE ────────────────────────────────────────────────
const BOOT_LINES = [
  { text: '+------------------------------------------------------+', color: 'var(--text-3)', delay: 0 },
  { text: '|  system-o  ·  Markdown OS  ·  v0.1.0-pre             |', color: 'var(--accent)', delay: 60 },
  { text: '|  Press Pause Garage  ·  2026                         |', color: 'var(--text-3)', delay: 120 },
  { text: '+------------------------------------------------------+', color: 'var(--text-3)', delay: 180 },
  { text: '', delay: 260 },
  { text: 'Initializing quality pipeline...', color: 'var(--text-2)', delay: 320 },
  { text: '  [QMS-001]  Spec layer ·················· LOADED', color: 'var(--accent)', delay: 500 },
  { text: '  [QMS-002]  Frontmatter schemas ········· LOADED', color: 'var(--accent)', delay: 640 },
  { text: '  [QMS-003]  Lifecycle state machines ···· LOADED', color: 'var(--accent)', delay: 780 },
  { text: '  [QMS-004]  Agent cascade rules ········· LOADED', color: 'var(--accent)', delay: 920 },
  { text: '  [QMS-005]  Traceability gates ·········· LOADED', color: 'var(--accent)', delay: 1060 },
  { text: '  [QMS-006]  ISO 13485 alignment ········· PARTIAL', color: 'var(--amber)', delay: 1200 },
  { text: '', delay: 1340 },
  { text: 'System ready. Type  help  to list commands.', color: 'var(--text-2)', delay: 1420 },
  { text: '', delay: 1500 },
];

// ─── O-BOY (interactive ASCII friend) ─────────────────────────────
const O_BOY_POSES = [
  ['   ___   ',
   '  |o o|  ',
   '  | _ |  ',
   '  |___|  ',
   '   | |   ',
   '  /| |\\  ',
   '   |_|   '],
  ['   ___   ',
   '  |- -|  ',
   '  | _ |  ',
   '  |___|  ',
   '   | |   ',
   '  /| |\\  ',
   '   |_|   '],
  ['   ___   ',
   '  |^ ^|  ',
   '  |\\_/|  ',
   '  |___|  ',
   '   | |   ',
   '  /| |\\  ',
   '   |_|   '],
  ['   ___   ',
   '  |O O|  ',
   '  | o |  ',
   '  |___|  ',
   '   | |   ',
   '  /| |\\  ',
   '   |_|   '],
  ['   ___   ',
   '  |- o|  ',
   '  | _ |  ',
   '  |___|  ',
   '   | |   ',
   '  /| |\\  ',
   '   |_|   '],
  ['   ___   ',
   '  |z z|  ',
   '  | _ |  ',
   '  |___|  ',
   '   | |   ',
   '  /| |\\  ',
   '   |_|   '],
];

const O_BOY_SAYINGS = [
  'oh hi',
  'spec is law',
  'gates are local',
  'no LLM in gates',
  'mind the cascade',
  "frontmatter or it didn't happen",
  '*beep*',
  'tombstones forever',
  '...',
  'ready',
  'friction-free in',
  'structured out',
];

function OBoy() {
  const [pose, setPose] = useState(0);
  const [say, setSay] = useState(null);
  const sayTimerRef = useRef(null);

  const click = (e) => {
    e.stopPropagation();
    setPose(p => (p + 1) % O_BOY_POSES.length);
    const msg = O_BOY_SAYINGS[Math.floor(Math.random() * O_BOY_SAYINGS.length)];
    setSay(msg);
    if (sayTimerRef.current) clearTimeout(sayTimerRef.current);
    sayTimerRef.current = setTimeout(() => setSay(null), 2200);
  };

  useEffect(() => () => {
    if (sayTimerRef.current) clearTimeout(sayTimerRef.current);
  }, []);

  return (
    <div onClick={click} style={{
      cursor: 'pointer',
      userSelect: 'none',
      display: 'inline-block',
      padding: '4px 8px',
    }}>
      <div style={{ height: '1.65em', color: 'var(--accent)', whiteSpace: 'pre' }}>
        {say ? `‹ ${say} ›` : ' '}
      </div>
      {O_BOY_POSES[pose].map((line, i) => (
        <div key={i} style={{
          color: 'var(--text)',
          lineHeight: 1.1,
          whiteSpace: 'pre',
        }}>{line}</div>
      ))}
      <div style={{
        color: 'var(--text-3)',
        marginTop: '6px',
        whiteSpace: 'pre',
      }}>
        {'‹ click me ›'}
      </div>
    </div>
  );
}

// ─── COMMAND REGISTRY ─────────────────────────────────────────────
const COMMANDS = {
  help: () => [
    <Line><Teal>Available commands</Teal></Line>,
    <HR />,
    <Line><Teal>help</Teal>        <Dim2> ·  list commands</Dim2></Line>,
    <Line><Teal>about</Teal>       <Dim2> ·  what is system-o</Dim2></Line>,
    <Line><Teal>spec</Teal>        <Dim2> ·  v1.0 spec overview (10 sections)</Dim2></Line>,
    <Line><Teal>iso</Teal>         <Dim2> ·  ISO 13485 quality alignment</Dim2></Line>,
    <Line><Teal>install</Teal>     <Dim2> ·  capability requirements</Dim2></Line>,
    <Line><Teal>github</Teal>      <Dim2> ·  open repository</Dim2></Line>,
    <Line><Teal>o-boy</Teal>       <Dim2> ·  ?</Dim2></Line>,
    <Line><Teal>clear</Teal>       <Dim2> ·  clear terminal</Dim2></Line>,
    <Gap />,
    <Line><Dim>↑ / ↓  navigate history   ·   Tab  autocomplete</Dim></Line>,
  ],

  about: () => [
    <Line><Teal>system-o</Teal> <Dim2>— Markdown OS for AI-augmented operators</Dim2></Line>,
    <Gap />,
    <Line>A portable vault spec + transform manifest that turns a plain</Line>,
    <Line>Markdown folder into a structured operating environment for humans and agents.</Line>,
    <Gap />,
    <Line><Dim2>Three layers:</Dim2></Line>,
    <Line>  <Blue>Spec</Blue>      <Dim2>folder taxonomy · frontmatter tiers · lifecycle state machines</Dim2></Line>,
    <Line>           <Dim2>agent cascade rules · canonical vocabulary</Dim2></Line>,
    <Line>  <Amber>Reference</Amber> <Dim2>one concrete implementation that satisfies the spec —</Dim2></Line>,
    <Line>           <Dim2>your choice of editor, scheduler, and agent host</Dim2></Line>,
    <Line>  <Dim>Distrib.</Dim>  <Dim2>scaffolder / installer — post-v1.0</Dim2></Line>,
    <Gap />,
    <Line><Dim2>Operating principle:</Dim2>  <T c="var(--text)">friction-free in, structured out.</T></Line>,
    <Line><Dim2>                     Gates are local-deterministic. LLM is participant, not policy-maker.</Dim2></Line>,
  ],

  spec: () => [
    <Line><Teal>v1.0 spec — 10 sections</Teal></Line>,
    <HR />,
    <Line><Dim2> 1</Dim2>  <Blue>Operating principles</Blue>   <Dim2>friction-free in · structured out · local-deterministic gates</Dim2></Line>,
    <Line><Dim2> 2</Dim2>  <Blue>File & folder taxonomy</Blue> <Dim2>canonical top-level shape · adopter-named vs. locked</Dim2></Line>,
    <Line><Dim2> 3</Dim2>  <Blue>Folder semantics</Blue>       <Dim2>who writes · who reads · never-touch invariants</Dim2></Line>,
    <Line><Dim2> 4</Dim2>  <Blue>Frontmatter rules</Blue>      <Dim2>3-tier capture rule · required minimum on real notes</Dim2></Line>,
    <Line><Dim2> 5</Dim2>  <Blue>Lifecycle state machines</Blue> <Dim2>launchpad → graduate/bury · handoff ready→complete · sewerpipe purge</Dim2></Line>,
    <Line><Dim2> 6</Dim2>  <Blue>Inbox routing rules</Blue>    <Dim2>6 destinations · exactly one per item</Dim2></Line>,
    <Line><Dim2> 7</Dim2>  <Blue>Registry schema</Blue>        <Dim2>required per-project card fields · slug as canonical ID</Dim2></Line>,
    <Line><Dim2> 8</Dim2>  <Blue>Risk + priority schemas</Blue> <Dim2>two independent axes · defaults per lifecycle stage</Dim2></Line>,
    <Line><Dim2> 9</Dim2>  <Blue>Agent-instructions cascade</Blue> <Dim2>CLAUDE.md / AGENTS.md · first-found wins · deterministic transform</Dim2></Line>,
    <Line><Dim2>10</Dim2>  <Blue>Canonical vocabulary</Blue>   <Dim2>tombstone · sewerpipe · handoff · launchpad · graduate · bury</Dim2></Line>,
    <Gap />,
    <Line><Dim2>Target:</Dim2>  single SPEC.md · 600–800 lines · hard ceiling 1500</Line>,
    <Line><Dim2>V1.0 definition:</Dim2>  spin clean VM · install stack · drop bundle · run for a day · verify conventions hold</Line>,
  ],

  iso: () => [
    <Line><Teal>ISO 13485:2016 — quality alignment map</Teal></Line>,
    <HR />,
    <Line><Dim2>system-o applies medical-device QMS discipline to AI development pipelines.</Dim2></Line>,
    <Line><Dim2>Gates are deterministic. Evidence is mandatory. Drift is auditable.</Dim2></Line>,
    <Gap />,
    <Line><Dim2>§ 4.1  Quality management system — general</Dim2></Line>,
    <Line>  <T c="var(--accent)">→</T>  Vault spec is the documented QMS. Folder taxonomy + frontmatter rules = QMS procedures.</Line>,
    <Gap />,
    <Line><Dim2>§ 4.2  Documentation requirements</Dim2></Line>,
    <Line>  <T c="var(--accent)">→</T>  Every "real" note carries required frontmatter. Type, tags, updated. Automation enforces schema.</Line>,
    <Line>  <T c="var(--accent)">→</T>  Handoffs carry verification blocks citing commit hashes, file paths, PR URLs.</Line>,
    <Gap />,
    <Line><Dim2>§ 7.1  Planning of product realization</Dim2></Line>,
    <Line>  <T c="var(--accent)">→</T>  Lifecycle state machines: launchpad → graduate / bury. Tombstones on every burial.</Line>,
    <Line>  <T c="var(--accent)">→</T>  Risk classification (1–3) gate destructive ops. High-risk = PR-only, no direct commit.</Line>,
    <Gap />,
    <Line><Dim2>§ 7.3  Design and development</Dim2></Line>,
    <Line>  <T c="var(--accent)">→</T>  Handoff → implementation → verification → complete. No flip without cited artifact.</Line>,
    <Line>  <T c="var(--accent)">→</T>  ADR template captures design decisions with rationale. Immutable once committed.</Line>,
    <Gap />,
    <Line><Dim2>§ 7.5  Production and service provision</Dim2></Line>,
    <Line>  <T c="var(--accent)">→</T>  Deterministic transforms. Same input + same manifest = byte-identical output. No LLM in gates.</Line>,
    <Gap />,
    <Line><Dim2>§ 8.2  Monitoring and measurement</Dim2></Line>,
    <Line>  <T c="var(--accent)">→</T>  Radar digests. Daily reports. Purge-sewerpipe logs. Triage logs. All machine-generated.</Line>,
    <Gap />,
    <Line><Dim2>§ 8.3  Control of nonconforming product</Dim2></Line>,
    <Line>  <T c="var(--accent)">→</T>  Sewerpipe: capture sink for junk + noise. Auto-purged after 30d. Drift signal = standing handoffs.</Line>,
    <Gap />,
    <Line><Amber>PARTIAL</Amber>  <Dim2>Gaps: formal CAPA process · source controls (data, feeds, APIs) · management review cadence</Dim2></Line>,
    <Line>       <Dim2>These are post-v1.0 concerns. Current focus: conformance test on clean VM.</Dim2></Line>,
  ],

  install: () => [
    <Line><Teal>Installation — capability requirements</Teal></Line>,
    <HR />,
    <Line><Dim2>system-o adopters compose a stack that satisfies four capabilities.</Dim2></Line>,
    <Line><Dim2>The spec is the artifact; the reference is one example.</Dim2></Line>,
    <Gap />,
    <Line><Dim2>Capability</Dim2>                  <Dim2>Role</Dim2></Line>,
    <Line>  <Blue>Editor</Blue>                    <Dim2>view + edit markdown files in a folder vault</Dim2></Line>,
    <Line>  <Blue>Task runner</Blue>               <Dim2>fire deterministic transforms on a schedule</Dim2></Line>,
    <Line>  <Blue>Frontmatter validator</Blue>     <Dim2>enforce schema on real notes</Dim2></Line>,
    <Line>  <Blue>Agent cascade host</Blue>        <Dim2>orient AI tools to a workspace via cascade files</Dim2></Line>,
    <Gap />,
    <Line><Dim2>Reference implementation</Dim2></Line>,
    <Line>  A fully wired example lives in the repo's <T c="var(--text)">/reference</T> tree.</Line>,
    <Line>  Substitute any equivalent component without breaking conformance.</Line>,
    <Gap />,
    <Line><Amber>Note</Amber>  <Dim2>Repository is private; awaiting public release scrub. Check back or watch GitHub for v1.0.</Dim2></Line>,
    <Gap />,
    <Line><Dim2>Conformance test:</Dim2>  spin a clean environment · install your stack · drop the bundle · run for one day · verify conventions hold</Line>,
  ],

  github: () => {
    setTimeout(() => {
      window.open('https://github.com/presspausegarage/system-o', '_blank');
    }, 400);
    return [
      <Line><Teal>Opening repository...</Teal></Line>,
      <Line><Dim2>github.com/presspausegarage/system-o</Dim2></Line>,
      <Gap />,
      <Line><Dim2>If the tab did not open:</Dim2></Line>,
      <Line>  <a href="https://github.com/presspausegarage/system-o" target="_blank"
          style={{ color: 'var(--blue)', textDecoration: 'none' }}>
          github.com/presspausegarage/system-o
        </a></Line>,
    ];
  },

  'o-boy': () => [<OBoy />],

  clear: () => '__CLEAR__',
};

const AUTOCOMPLETE = Object.keys(COMMANDS).sort();

// ─── MAIN TERMINAL ────────────────────────────────────────────────
function Terminal() {
  const [history, setHistory] = useState([]);   // rendered output blocks
  const [input, setInput] = useState('');
  const [cmdHistory, setCmdHistory] = useState([]);
  const [histIdx, setHistIdx] = useState(-1);
  const [booted, setBooted] = useState(false);
  const [bootLines, setBootLines] = useState([]);
  const endRef = useRef(null);
  const inputRef = useRef(null);

  // ── boot sequence
  useEffect(() => {
    let timers = [];
    BOOT_LINES.forEach((bl, i) => {
      const t = setTimeout(() => {
        setBootLines(prev => [...prev, bl]);
        if (i === BOOT_LINES.length - 1) setBooted(true);
      }, bl.delay);
      timers.push(t);
    });
    return () => timers.forEach(clearTimeout);
  }, []);

  // ── auto-scroll
  useEffect(() => {
    endRef.current?.scrollIntoView({ block: 'end' });
  }, [history, bootLines]);

  // ── focus on click anywhere
  const focusInput = () => inputRef.current?.focus();

  const runCommand = useCallback((raw) => {
    const cmd = raw.trim().toLowerCase();
    if (!cmd) return;

    setCmdHistory(prev => [raw, ...prev]);
    setHistIdx(-1);

    if (cmd === 'clear') {
      setHistory([]);
      setBootLines([]);
      return;
    }

    const handler = COMMANDS[cmd];
    const output = handler
      ? handler()
      : [
          <Line><Red>command not found:</Red> <T c="var(--text)">{cmd}</T></Line>,
          <Line><Dim2>Type  help  to list commands.</Dim2></Line>,
        ];

    if (output === '__CLEAR__') { setHistory([]); return; }

    setHistory(prev => [
      ...prev,
      {
        prompt: raw,
        lines: output,
        id: Date.now() + Math.random(),
      },
    ]);
  }, []);

  const handleKey = (e) => {
    if (e.key === 'Enter') {
      runCommand(input);
      setInput('');
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      const newIdx = Math.min(histIdx + 1, cmdHistory.length - 1);
      setHistIdx(newIdx);
      setInput(cmdHistory[newIdx] ?? '');
    } else if (e.key === 'ArrowDown') {
      e.preventDefault();
      const newIdx = Math.max(histIdx - 1, -1);
      setHistIdx(newIdx);
      setInput(newIdx === -1 ? '' : cmdHistory[newIdx] ?? '');
    } else if (e.key === 'Tab') {
      e.preventDefault();
      const match = AUTOCOMPLETE.find(c => c.startsWith(input.toLowerCase()));
      if (match) setInput(match);
    }
  };

  return (
    <div
      onClick={focusInput}
      style={{
        width: '100vw', height: '100vh',
        display: 'flex', flexDirection: 'column',
        background: 'var(--bg)',
        cursor: 'text',
        position: 'relative',
        overflow: 'hidden',
      }}
    >
      {/* scanline overlay */}
      <div style={{
        position: 'absolute', inset: 0, pointerEvents: 'none', zIndex: 10,
        background: 'repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.04) 2px, rgba(0,0,0,0.04) 4px)',
      }} />

      {/* terminal body */}
      <div
        style={{
          flex: 1, overflowY: 'auto', padding: '18px 28px 0',
          fontFamily: 'var(--mono)', fontSize: 13,
        }}
      >
        {/* boot lines */}
        {bootLines.map((bl, i) => (
          <div key={i} style={{ color: bl.color || 'var(--text)', lineHeight: '1.65',
            animation: 'fadeIn 0.15s ease both',
            whiteSpace: 'pre',
          }}>
            {bl.text}
          </div>
        ))}

        {/* command history */}
        {history.map((block) => (
          <div key={block.id} style={{ animation: 'fadeIn 0.12s ease both' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, margin: '12px 0 4px' }}>
              <span style={{ color: 'var(--accent)', userSelect: 'none' }}>❯</span>
              <span style={{ color: 'var(--text)' }}>{block.prompt}</span>
            </div>
            <div style={{ paddingLeft: 4 }}>
              {block.lines.map((line, li) =>
                React.isValidElement(line)
                  ? React.cloneElement(line, { key: li })
                  : <div key={li}>{line}</div>
              )}
            </div>
          </div>
        ))}

        <div ref={endRef} style={{ height: 18 }} />
      </div>

      {/* input line */}
      <div style={{
        display: 'flex', alignItems: 'center', gap: 8,
        padding: '10px 28px 12px',
        borderTop: '1px solid var(--border)',
        background: 'var(--bg)', flexShrink: 0, zIndex: 2,
      }}>
        <span style={{ color: 'var(--accent)', fontSize: 14, userSelect: 'none' }}>❯</span>
        <input
          ref={inputRef}
          value={input}
          onChange={e => setInput(e.target.value)}
          onKeyDown={handleKey}
          autoFocus
          spellCheck={false}
          autoComplete="off"
          style={{
            flex: 1, background: 'transparent', border: 'none', outline: 'none',
            color: 'var(--text)', fontFamily: 'var(--mono)', fontSize: 13,
            caretColor: 'var(--accent)',
          }}
          placeholder=""
        />
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Terminal />);
</script>
</body>
</html>
