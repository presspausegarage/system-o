# Copy to docker-compose.yml alongside the Dockerfile (docker-compose.yml is
# gitignored) and point the bind mount at wherever you want your vault to live
# on the host.
#
# KEEP THE VAULT OUTSIDE THIS CLONE. A vault inside the source tree risks
# leaking into Git or a Docker build context. The repo-root .dockerignore and
# .gitignore guard the known in-clone paths, but a path outside the clone
# needs no guarding at all - that is the recommended shape.
#
# Build context is the repo root (two levels up from here), not this
# directory -- the Dockerfile needs both reference/ and spec/ in its context
# (see the Dockerfile's own comment on this). Run `docker compose` from here
# and this relative path resolves correctly; if you copy this file elsewhere,
# adjust `context:` to still point at the repo root.
#
# `init: true` matters -- see entrypoint.ps1's signal-handling note.

services:
  system-o:
    build:
      context: ../..
      dockerfile: reference/docker/Dockerfile
    init: true
    volumes:
      # host vault path (outside the clone) : container mount
      - ~/system-o-vault:/vault
    environment:
      VAULT_ROOT: /vault
      # CLAUDE.md or AGENTS.md (spec §Agent orientation files). Decide BEFORE
      # first boot: the scaffold runs once, so changing this later does not
      # create the other file.
      AGENT_TARGET: CLAUDE.md
      # Cron fires on the container clock - UTC unless you set this.
      # TZ: America/New_York
    restart: unless-stopped
